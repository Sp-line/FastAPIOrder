services:

  pg:
    image: postgres
    env_file:
      - app/.env
    ports:
      - "5434:5432"

  redis:
    image: redis:8-alpine
    container_name: order_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
